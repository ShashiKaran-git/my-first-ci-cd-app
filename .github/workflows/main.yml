name: My first CI/CD App
on:
    push:
        branches: [ master ]
    pull_requests:
        branches: [ master ]            

jobs:
    
  test:
    runs on: ubuntu-latest
    strategy:
        fail-fast: false
        matrix:
            python-version: [ 3.8, 3.9, 3.10 ]
        steps:
            - name: checkout code
              uses: actions/setup-python@v5
            - with:
                python-version: ${{ matrix.python-version }}  
            - name: install dependencies
              run: pip install -r requirements.txt
            - name: run tests         
              run: pytest test_app.py -v

deploy:
   runs on: ubuntu-latest
   needs: test

   steps:
        - name: checkout code
          uses: actions/checkout@v4

        - name: login to docker hub
          uses: docker/login-action@v3
           with:
            username: ${{ secrets.DOCKER_USERNAME1 }}
            password: ${{ secrets.DOCKER_PASSWORD1 }}           
         
        - name: build docker image
          run: docker build -t myapp:${{ secrets.DOCKER_USERNAME1 }}/my-first-ci-cd-app:latest .

        - name: push docker image
          run: docker push ${{ secrets.DOCKER_USERNAME1 }}/my-first-ci-cd-app:latest 
